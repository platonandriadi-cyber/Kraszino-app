<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kraszino</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #162447;
            --accent-color: #e43f5a;
            --text-color: #ffffff;
            --text-secondary: #95a5a6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }
        .header {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .balance {
            font-size: 24px;
            font-weight: bold;
            color: #2ecc71;
            margin-top: 5px;
        }
        .nav-tabs {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 15px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            border-radius: 8px;
        }
        .tab-btn.active {
            background: var(--accent-color);
            color: #white;
        }
        .game-container {
            display: none;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            min-height: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .game-container.active {
            display: block;
        }
        button.action-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        button:disabled {
            background: #555 !important;
            opacity: 0.6;
        }
        input[type="number"] {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 80%;
            font-size: 16px;
            text-align: center;
            margin-bottom: 10px;
        }
        /* ИГРА: Слоты */
        .slots-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 45px;
            margin: 20px 0;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
        }
        /* ИГРА: Кости */
        .dice-display {
            font-size: 60px;
            margin: 15px 0;
        }
        .dice-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .dice-btn {
            background: #34495e;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
        }
        .dice-btn.selected {
            background: #2980b9;
        }
        /* ИГРА: Колесо */
        .wheel-display {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid gold;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            background: conic-gradient(#e74c3c 0deg 90deg, #3498db 90deg 180deg, #2ecc71 180deg 270deg, #f1c40f 270deg 360deg);
            transition: transform 2s ease-out;
        }
        .wheel-pointer {
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
        }
        /* ИГРА: Мины */
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        .mine-cell {
            aspect-ratio: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }
        .mine-cell.opened { background: #2c3e50; }
        .mine-cell.gem { background: #2ecc71; }
        .mine-cell.bomb { background: #e74c3c; }
        .result-msg {
            font-weight: bold;
            margin-top: 10px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="user-name">Удачи, Игрок!</div>
        <div class="balance">💰 <span id="balance-val">1000</span></div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('slots')">🎰 Слоты</button>
        <button class="tab-btn" onclick="switchTab('mines')">💣 Мины</button>
        <button class="tab-btn" onclick="switchTab('dice')">🎲 Кости</button>
        <button class="tab-btn" onclick="switchTab('wheel')">🎡 Колесо</button>
    </div>

    <!-- СЛОТЫ -->
    <div id="game-slots" class="game-container active">
        <h3>Игровые Автоматы</h3>
        <input type="number" id="slots-bet" value="10" min="1">
        <div class="slots-display">
            <span id="s1">🍒</span><span id="s2">🍒</span><span id="s3">🍒</span>
        </div>
        <button class="action-btn" onclick="playSlots()">Крутить</button>
        <div id="slots-res" class="result-msg"></div>
    </div>

    <!-- МИНЫ -->
    <div id="game-mines" class="game-container">
        <h3>Мины (Ячеек с бомбой: 3)</h3>
        <input type="number" id="mines-bet" value="10" min="1">
        <button id="mines-start-btn" class="action-btn" onclick="startMines()">Начать игру</button>
        <button id="mines-cash-btn" class="action-btn" style="background:#2ecc71; display:none;" onclick="cashoutMines()">Забрать куш</button>
        <div class="mines-grid" id="mines-board"></div>
        <div id="mines-res" class="result-msg"></div>
    </div>

    <!-- КОСТИ -->
    <div id="game-dice" class="game-container">
        <h3>Кости (Больше / Меньше)</h3>
        <input type="number" id="dice-bet" value="10" min="1">
        <div class="dice-controls">
            <button id="db-under" class="dice-btn selected" onclick="setDiceMode('under')">Меньше 4</button>
            <button id="db-over" class="dice-btn" onclick="setDiceMode('over')">Больше 3</button>
        </div>
        <div class="dice-display" id="dice-view">🎲</div>
        <button class="action-btn" onclick="playDice()">Бросить</button>
        <div id="dice-res" class="result-msg"></div>
    </div>

    <!-- КОЛЕСО -->
    <div id="game-wheel" class="game-container">
        <h3>Колесо Фортуны</h3>
        <input type="number" id="wheel-bet" value="10" min="1">
        <div class="wheel-display" id="wheel-obj">
            <div class="wheel-pointer" id="wheel-text">X1</div>
        </div>
        <button class="action-btn" onclick="playWheel()">Вращать</button>
        <div id="wheel-res" class="result-msg"></div>
    </div>

    <script>
        // Инициализация Telegram WebApp API
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            if (tg.initDataUnsafe?.user) {
                document.getElementById('user-name').innerText = `Игрок: ${tg.initDataUnsafe.user.first_name}`;
            }
        }

        let balance = 1000;
        function updateBalance(amount) {
            balance += amount;
            document.getElementById('balance-val').innerText = balance;
        }

        function switchTab(game) {
            document.querySelectorAll('.game-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`game-${game}`).classList.add('active');
            event.target.classList.add('active');
            resetMinesState();
        }

        // КРУТИЛКА СЛОТОВ
        const slotItems = ['🍒', '🍋', '🍉', '🍇', '💎', '7️⃣'];
        function playSlots() {
            let bet = parseInt(document.getElementById('slots-bet').value);
            if(bet > balance || bet <= 0) return alert('Недостаточно монет!');
            updateBalance(-bet);
            
            let r1 = slotItems[Math.floor(Math.random()*slotItems.length)];
            let r2 = slotItems[Math.floor(Math.random()*slotItems.length)];
            let r3 = slotItems[Math.floor(Math.random()*slotItems.length)];
            
            document.getElementById('s1').innerText = r1;
            document.getElementById('s2').innerText = r2;
            document.getElementById('s3').innerText = r3;
            
            let res = document.getElementById('slots-res');
            if(r1 === r2 && r2 === r3) {
                let win = bet * 5;
                updateBalance(win);
                res.innerHTML = `<span style="color:#2ecc71">ДЖЕКПОТ! +${win} монет!</span>`;
            } else if(r1 === r2 || r2 === r3 || r1 === r3) {
                let win = Math.floor(bet * 1.5);
                updateBalance(win);
